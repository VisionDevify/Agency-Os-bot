services:
  api:
    build: .
    env_file:
      - .env
    environment:
      FORTUNA_START_BOT_WITH_API: "false"
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  bot:
    build: .
    command: python -m app.bot.runner
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agency_os
      POSTGRES_USER: agency
      POSTGRES_PASSWORD: agency
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
